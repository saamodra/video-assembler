# Example Script Configuration
# Lines starting with '#' or '//' are comments and will be ignored by the builder.

TITLE: Video Assembler Demo
SUBTITLE: Example Script

# Generates a standard text slide for 3 seconds (or based on config.json)
TEXT: Welcome to the video assembler!

# Pulls in the video from assets, and uses Whisper to crop it exactly to where the speaker says the text
# Note: Format is "VIDEO: <path> | CROP_TEXT: <spoken text to find>"
VIDEO: examples/demo_video.mp4 | CROP_TEXT: Welcome to the video assembler.

# Generates another standard text slide
TEXT: You can pull multiple different clips from the same source file...
VIDEO: examples/demo_video.mp4 | CROP_TEXT: This is an example clip.

TEXT: ...and pick out exact phrases!
VIDEO: examples/demo_video.mp4 | CROP_TEXT: You can crop me easily using text commands.

TEXT: Thanks for trying it out!
VIDEO: examples/demo_video.mp4 | CROP_TEXT: Thank you for watching.
